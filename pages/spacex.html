<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>스페이스엑스 | 머니하우</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<!-- 폰트 두께 700(Bold) 유지, 당근마켓용 Noto Sans KR 추가 -->
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,700&family=Noto+Sans+KR:wght@300;400;500;700&family=Bebas+Neue&family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Source+Sans+3:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
:root{
  --sw:260px;
  /* 밝고 부드러운 사이드바 테마 */
  --sbg:#FBFBF9;
  --sbor:#E6E4DC;
  --st:#72727A;
  --sha:rgba(0,0,0,0.04);
  --sab:#FDF2E0;
  --sat:#1B1B1D;
  --acc:#D4A843;--acc2:rgba(212,168,67,0.14);
  --bg:#F6F5F1;--sur:#FFFFFF;--bor:#E6E4DC;--t1:#1B1B1D;--t2:#6A6A6D;--t3:#9A9A9E;
  --grn:#1E8F5D;--grn2:#EBF5EE;--red:#C0392B;--red2:#FAEBEB;--amb:#B87818;--amb2:#FDF2E0;
  --blue:#3B8BD4; --purple:#7F77DD;
  --rad:10px;--rad2:14px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',system-ui,sans-serif;font-size:14px;background:var(--bg);color:var(--t1);display:flex;height:100vh;overflow:hidden;}

/* SIDEBAR */
.sb{width:var(--sw);background:var(--sbg);border-right:1px solid var(--sbor);display:flex;flex-direction:column;flex-shrink:0;z-index:10;}
.sb-head{padding:20px 16px 14px;border-bottom:1px solid var(--sbor);cursor:pointer;transition:opacity 0.2s;}
.sb-head:hover{opacity:0.8;}
.sb-logo{font-family:'DM Serif Display',Georgia,serif;font-size:16px;color:var(--sat);letter-spacing:-.01em;margin-bottom:2px;}
.sb-tag{font-size:11px;color:var(--st);letter-spacing:.04em;}
.sb-search{padding:10px 12px;border-bottom:1px solid var(--sbor);}
.sb-search input{width:100%;background:#FFFFFF;border:1px solid var(--bor);border-radius:6px;padding:8px 12px;font-size:12px;color:var(--t1);outline:none;font-family:inherit;transition:border-color .15s;}
.sb-search input::placeholder{color:var(--t3);}
.sb-search input:focus{border-color:var(--acc);}

.sb-nav{flex:1;overflow-y:auto;padding:10px 0;scrollbar-width:thin;scrollbar-color:rgba(0,0,0,.15) transparent;}
.cat{margin-bottom:4px;}
.cat-head{display:flex;align-items:center;padding:6px 16px;cursor:pointer;color:var(--st);font-size:11px;font-weight:500;letter-spacing:.07em;text-transform:uppercase;user-select:none;transition:color .12s;}
.cat-head:hover{color:#444;}
.cat-arr{margin-left:auto;font-size:9px;transition:transform .18s;opacity:.45;}
.cat.open .cat-arr{transform:rotate(90deg);}
.cat-items{display:none;padding:2px 0;}
.cat.open .cat-items{display:block;}
.nav-item{display:flex;align-items:center;gap:8px;padding:7px 16px 7px 28px;cursor:pointer;color:var(--st);font-size:13px;transition:all .1s;position:relative;}
.nav-item:hover{background:var(--sha);color:var(--t1);}
.nav-item.act{background:var(--sab);color:var(--sat);font-weight:500;}
.nav-item.act::before{content:'';position:absolute;left:0;top:6px;bottom:6px;width:3px;background:var(--acc);border-radius:0 3px 3px 0;}
.nav-dot{width:4px;height:4px;border-radius:50%;background:currentColor;opacity:.4;flex-shrink:0;}

.sb-foot{padding:12px;border-top:1px solid var(--sbor);background:var(--sbg);}
.btn-add{width:100%;padding:10px;background:var(--acc2);border:1px solid rgba(212,168,67,.22);border-radius:8px;color:var(--acc);font-size:13px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;transition:all .15s;font-family:inherit;}
.btn-add:hover{background:rgba(212,168,67,.3);}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;position:relative;}
.topbar{padding:0 28px;height:56px;border-bottom:1px solid var(--bor);display:flex;align-items:center;gap:12px;background:var(--sur);flex-shrink:0;}
.bc{font-size:13px;color:var(--t3);display:flex;align-items:center;gap:6px;}
.bc-home{cursor:pointer;padding:6px;border-radius:8px;background:var(--bg);color:var(--t2);transition:all 0.15s;display:flex;align-items:center;justify-content:center;}
.bc-home:hover{background:#E8E6DF;color:var(--t1);}
.bc-cur{color:var(--t1);font-weight:500;}
.tb-acts{margin-left:auto;display:flex;align-items:center;gap:6px;}
.ib{width:32px;height:32px;border:1px solid var(--bor);border-radius:8px;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--t2);transition:all .12s;}
.ib:hover{background:var(--bg);color:var(--t1);}
.ib.active{background:var(--amb2);border-color:#E0C070;color:var(--amb);}
.content{flex:1;overflow-y:auto;padding:32px 28px 60px; scroll-behavior: smooth;}

/* WELCOME & UTILS */
.welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:70vh;text-align:center;gap:0;}
.wt{font-family:'DM Serif Display',Georgia,serif;font-size:44px;color:var(--t1);letter-spacing:-.025em;margin-bottom:12px;line-height:1.15;}
.wt em{font-style:italic;color:var(--amb);}
.ws{font-size:15px;color:var(--t2);max-width:400px;line-height:1.6;margin-bottom:32px;}
.w-chips{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;max-width:520px;}
.chip{padding:8px 16px;background:var(--sur);border:1px solid var(--bor);border-radius:100px;font-size:13px;color:var(--t2);cursor:pointer;transition:all .15s;font-weight:500;}
.chip:hover{border-color:var(--acc);color:var(--amb);background:var(--amb2);}

/* PAGE */
.pg-head{margin-bottom:28px;}
.pg-badges{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap;}
.pg-badge{display:inline-flex;align-items:center;padding:4px 12px;background:var(--amb2);border-radius:100px;font-size:11px;font-weight:600;color:var(--amb);letter-spacing:.02em;}
.pg-badge.tag{background:#EFEFEF;color:var(--t2);font-weight:500;}
.pg-title{font-family:'DM Serif Display',Georgia,serif;font-size:34px;letter-spacing:-.02em;color:var(--t1);margin-bottom:6px;line-height:1.2;}
.pg-title em{font-style:italic;color:var(--amb);}
.pg-sub{font-size:15px;color:var(--t2);line-height:1.55;}

/* METRICS */
.mets{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px;}
.met{background:var(--sur);border:1px solid var(--bor);border-radius:var(--rad);padding:16px 18px;}
.met-lbl{font-size:12px;color:var(--t3);margin-bottom:6px;letter-spacing:.02em;}
.met-val{font-size:24px;font-weight:500;color:var(--t1);letter-spacing:-.02em;line-height:1.1;}
.met-sub{font-size:11.5px;color:var(--t3);margin-top:4px;}
.met-val.g{color:var(--grn);}
.met-val.r{color:var(--red);}
.met-val.a{color:var(--amb);}

/* CARDS GRID */
.cg{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px;}
.cg.full{grid-template-columns:1fr;}
.card{background:var(--sur);border:1px solid var(--bor);border-radius:var(--rad2);padding:20px 24px;}
.card-t{font-size:14px;font-weight:600;color:var(--t1);margin-bottom:4px;}
.card-d{font-size:12px;color:var(--t3);margin-bottom:16px;}
.ch-wrap{position:relative;width:100%;}

/* BREAKDOWN */
.bd-item{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.bd-lbl{font-size:12px;color:var(--t2);min-width:160px;text-align:right;flex-shrink:0;}
.bd-bar-wrap{flex:1;background:#EDEAE2;border-radius:4px;height:16px;overflow:hidden;}
.bd-bar{height:100%;border-radius:4px;transition:width .7s cubic-bezier(.4,0,.2,1);}
.bd-val{font-size:12px;font-weight:600;min-width:85px;text-align:right;flex-shrink:0;}

/* INSIGHTS */
.ins-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px;margin-bottom:24px;}
.ins-card{background:var(--sur);border:1px solid var(--bor);border-radius:var(--rad);padding:16px 20px;transition:all .15s;cursor:default;}
.ins-card:hover{box-shadow:0 4px 16px rgba(0,0,0,.06);border-color:#D8D4CC;transform:translateY(-2px);}
.ins-num{font-family:'DM Sans',system-ui,sans-serif;font-size:19px;font-weight:700;color:var(--acc);line-height:1.2;margin-bottom:6px;letter-spacing:-0.01em;}
.ins-title{font-size:13px;font-weight:600;color:var(--t1);margin-bottom:4px;}
.ins-body{font-size:12px;color:var(--t2);line-height:1.5;}

/* SIMULATOR */
.sim-card{background:var(--sur);border:1px solid var(--bor);border-radius:var(--rad2);padding:20px 24px;margin-bottom:24px;}
.sl-row{display:flex;align-items:center;gap:12px;margin-bottom:10px;}
.sl-lbl{font-size:13px;color:var(--t2);min-width:100px;}
.sl-row input[type=range]{flex:1;accent-color:var(--acc);}
.sl-val{font-size:13px;font-weight:600;min-width:70px;text-align:right;}
.sim-outs{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-top:16px;}
.so{background:var(--bg);border-radius:var(--rad);padding:12px 14px;}
.so-l{font-size:11px;color:var(--t3);margin-bottom:4px;}
.so-v{font-size:15px;font-weight:600;}

/* COMPARISON TABLE */
.cmp-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:8px;}
.cmp-col{border:1px solid var(--bor);border-radius:var(--rad2);padding:16px;}
.cmp-col.hl{border-width:2px;border-color:#90CBA0;background:#FBFEFC;}
.cmp-badge{font-size:11px;font-weight:600;background:var(--grn2);color:var(--grn);padding:3px 10px;border-radius:100px;display:inline-block;margin-bottom:8px;}
.cmp-head{font-size:14px;font-weight:600;margin-bottom:12px;}
.cmp-row{display:flex;justify-content:space-between;font-size:12px;padding:5px 0;border-bottom:1px solid #F0EDE6;}
.cmp-row:last-child{border-bottom:none;font-weight:600;padding-top:8px;}

/* RELATED */
.rel-sec{border-top:1px solid var(--bor);padding-top:24px;margin-top:8px;}
.rel-title{font-size:12px;font-weight:600;color:var(--t3);letter-spacing:.06em;text-transform:uppercase;margin-bottom:12px;}
.rel-chips{display:flex;flex-wrap:wrap;gap:8px;}

/* MODAL & LOADER */
.mo-ov{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:100;opacity:0;pointer-events:none;transition:opacity .2s;}
.mo-ov.open{opacity:1;pointer-events:all;backdrop-filter:blur(3px);}
.mo{background:var(--sur);border-radius:var(--rad2);padding:30px;width:420px;max-width:92vw;transform:translateY(15px);transition:transform .2s;border:1px solid var(--bor);box-shadow:0 10px 40px rgba(0,0,0,.15);}
.mo-ov.open .mo{transform:translateY(0);}
.mo-t{font-family:'DM Serif Display',Georgia,serif;font-size:24px;margin-bottom:6px;color:var(--t1);}
.mo-s{font-size:14px;color:var(--t2);margin-bottom:20px;line-height:1.5;}
.mo-input{width:100%;padding:12px 14px;border:1px solid var(--bor);border-radius:var(--rad);font-size:14px;outline:none;font-family:inherit;margin-bottom:12px;transition:border-color .15s;background:var(--bg);}
.mo-input:focus{border-color:var(--acc);background:var(--sur);}
.mo-examples{font-size:12px;color:var(--t3);margin-bottom:20px;}
.mo-acts{display:flex;gap:8px;justify-content:flex-end;}
.btn-p{padding:10px 18px;background:var(--t1);color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:opacity .15s;display:flex;align-items:center;gap:6px;}
.btn-p:hover{opacity:.85;}
.btn-s{padding:10px 16px;background:transparent;color:var(--t2);border:1px solid var(--bor);border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;}
.btn-s:hover{background:var(--bg);color:var(--t1);}

.ai-loader{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:55vh;text-align:center;gap:16px;}
.spinner-icon{font-size:36px;animation:spin 2s linear infinite;color:var(--acc);}
.ai-text{font-family:'DM Serif Display',Georgia,serif;font-size:24px;color:var(--t1);}
.ai-sub{font-size:14px;color:var(--t2);}
@keyframes spin{to{transform:rotate(360deg);}}

@media(max-width:900px){
  :root{--sw:0px;}
  .sb{position:fixed;left:-280px;height:100%;width:280px;transition:left 0.3s;box-shadow:4px 0 15px rgba(0,0,0,0.2);}
  .sb.mobile-open{left:0;}
  .sb-ov{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:9;opacity:0;pointer-events:none;transition:opacity 0.3s;backdrop-filter:blur(2px);}
  .sb-ov.mobile-open{opacity:1;pointer-events:all;}
  .mets{grid-template-columns:repeat(2,1fr);}
  .cg{grid-template-columns:1fr;}
  .sim-outs{grid-template-columns:repeat(2,1fr);}
  .sp-detail-grid, .sp-board { grid-template-columns: 1fr; }
  .topbar{padding:0 16px;}
  .content{padding:20px 16px 40px;}
}

/* ──────────────────────────────────────────────────────────
   DAANGN CUSTOM STYLES (Light Theme Adapted)
   ────────────────────────────────────────────────────────── */
.dg-wrap-outer { margin: -32px -28px -60px; padding: 32px 28px 60px; min-height: 100vh; position: relative; background: #FBF8F4; font-family: 'Noto Sans KR', system-ui, sans-serif; color: #2A1F14; }
.dg-wrap-outer::before { content:''; position:absolute; inset:0; background-image: radial-gradient(circle at 20% 50%, rgba(255,111,44,.04) 0%, transparent 50%), radial-gradient(circle at 80% 20%, rgba(255,111,44,.03) 0%, transparent 40%); pointer-events:none; z-index:0; }
.dg-wrap { position: relative; z-index: 1; max-width: 940px; margin: 0 auto; padding: 0 0 80px; }

.dg-wrap {
  --dg-bg:#FBF8F4; --dg-bg2:#F5F0E8; --dg-sur:#FFFFFF; --dg-sur2:#FDF9F5;
  --dg-bor:#E8E0D4; --dg-bor2:#D4C8B8;
  --dg-t1:#2A1F14; --dg-t2:#7A6A58; --dg-t3:#A89880;
  --dg-car:#FF6F2C; --dg-car2:rgba(255,111,44,.1); --dg-car3:rgba(255,111,44,.2); --dg-car4:#E55E1E;
  --dg-grn:#2E8B57; --dg-blu:#3A7BD5; --dg-yel:#E8A020; --dg-red:#D94040;
  --dg-rad:10px; --dg-rad2:16px;
}

.dg-hero { padding: 52px 0 44px; display: flex; align-items: center; gap: 32px; }
.dg-hero-left { flex: 1; }
.dg-hero-eyebrow { display: inline-flex; align-items: center; gap: 6px; padding: 4px 12px; background: var(--dg-car2); border: 1px solid var(--dg-car3); border-radius: 100px; font-size: 11px; font-weight: 700; color: var(--dg-car); letter-spacing: .04em; margin-bottom: 14px; }
.dg-hero-title { font-family: 'DM Serif Display', Georgia, serif; font-size: clamp(32px, 5vw, 52px); line-height: 1.1; letter-spacing: -.025em; color: var(--dg-t1); margin-bottom: 10px; }
.dg-hero-title em { font-style: italic; color: var(--dg-car); }
.dg-hero-sub { font-size: 14px; color: var(--dg-t2); line-height: 1.65; max-width: 400px; font-weight: 400; }
.dg-hero-right { flex-shrink: 0; width: 200px; height: 200px; position: relative; }
.dg-hero-phone { width: 100%; height: 100%; background: var(--dg-sur); border-radius: 28px; border: 2px solid var(--dg-bor2); display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 8px 32px rgba(0,0,0,.08); }
.dg-phone-bar { background: var(--dg-car); padding: 10px 14px; display: flex; align-items: center; gap: 6px; }
.dg-phone-bar-dot { width: 6px; height: 6px; border-radius: 50%; background: rgba(255,255,255,.5); }
.dg-phone-bar-title { font-size: 11px; font-weight: 700; color: #fff; margin-left: 4px; }
.dg-phone-item { display: flex; gap: 8px; padding: 8px 10px; border-bottom: 1px solid var(--dg-bor); }
.dg-phone-thumb { width: 38px; height: 38px; border-radius: 8px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 18px; }
.dg-phone-info { flex: 1; min-width: 0; }
.dg-phone-name { font-size: 9.5px; font-weight: 500; color: var(--dg-t1); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.dg-phone-price { font-size: 10px; font-weight: 700; color: var(--dg-car); }
.dg-phone-loc { font-size: 8.5px; color: var(--dg-t3); }
.dg-phone-badge { font-size: 7.5px; padding: 1.5px 5px; border-radius: 3px; font-weight: 700; }
.dg-phone-badge.ad { background: var(--dg-car2); color: var(--dg-car); }

.dg-mets { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 28px; }
.dg-met { background: var(--dg-sur); border: 1px solid var(--dg-bor); border-radius: var(--dg-rad2); padding: 16px 18px; transition: all .2s; }
.dg-met:hover { border-color: var(--dg-car); box-shadow: 0 2px 12px var(--dg-car2); }
.dg-met-icon { font-size: 20px; margin-bottom: 8px; }
.dg-met-lbl { font-size: 10px; color: var(--dg-t3); letter-spacing: .04em; margin-bottom: 5px; font-weight: 500; }
.dg-met-val { font-size: 22px; font-weight: 700; color: var(--dg-t1); letter-spacing: -.02em; line-height: 1; }
.dg-met-val.car { color: var(--dg-car); }
.dg-met-val.grn { color: var(--dg-grn); }
.dg-met-sub { font-size: 10.5px; color: var(--dg-t3); margin-top: 4px; }

.dg-sec { margin-bottom: 28px; }
.dg-sec-head { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
.dg-sec-num { font-family: 'DM Serif Display', Georgia, serif; font-size: 13px; color: var(--dg-car); opacity: .6; }
.dg-sec-title { font-size: 12px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; color: var(--dg-t2); }
.dg-sec-line { flex: 1; height: 1px; background: var(--dg-bor); }

.dg-card { background: var(--dg-sur); border: 1px solid var(--dg-bor); border-radius: var(--dg-rad2); padding: 18px 20px; transition: border-color .2s; }
.dg-card-t { font-size: 13px; font-weight: 700; color: var(--dg-t1); margin-bottom: 3px; }
.dg-card-d { font-size: 11px; color: var(--dg-t3); margin-bottom: 14px; line-height: 1.5; }
.dg-g2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

.dg-paradox { background: linear-gradient(135deg, var(--dg-sur) 0%, var(--dg-sur2) 100%); border: 1px solid var(--dg-bor); border-radius: var(--dg-rad2); padding: 20px 24px; margin-bottom: 28px; display: flex; gap: 24px; align-items: center; }
.dg-px-left { flex: 1; }
.dg-px-title { font-family: 'DM Serif Display', Georgia, serif; font-size: 22px; color: var(--dg-t1); margin-bottom: 8px; line-height: 1.2; }
.dg-px-title em { font-style: italic; color: var(--dg-car); }
.dg-px-body { font-size: 13px; color: var(--dg-t2); line-height: 1.65; font-weight: 400; }
.dg-px-right { flex-shrink: 0; text-align: center; }
.dg-px-big { font-family: 'DM Serif Display', Georgia, serif; font-size: 56px; color: var(--dg-car); line-height: 1; }
.dg-px-big-sub { font-size: 11px; color: var(--dg-t3); margin-top: 4px; }
.dg-px-arrow { font-size: 28px; margin: 6px 0; opacity: .3; }
.dg-px-small { font-size: 13px; font-weight: 700; color: var(--dg-grn); }

.dg-rev-stream { display: flex; flex-direction: column; gap: 10px; margin-bottom: 12px; }
.dg-rs-item { background: var(--dg-sur); border: 1px solid var(--dg-bor); border-radius: var(--dg-rad2); padding: 16px 18px; cursor: pointer; transition: all .2s; display: flex; gap: 14px; align-items: flex-start; }
.dg-rs-item:hover, .dg-rs-item.on { border-color: var(--dg-car); background: var(--dg-sur2); }
.dg-rs-item.on { box-shadow: 0 2px 16px var(--dg-car2); }
.dg-rs-icon-wrap { width: 42px; height: 42px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
.dg-rs-body { flex: 1; }
.dg-rs-head { display: flex; align-items: baseline; gap: 8px; margin-bottom: 4px; }
.dg-rs-name { font-size: 13px; font-weight: 700; color: var(--dg-t1); }
.dg-rs-share { font-size: 11px; font-weight: 700; padding: 1px 8px; border-radius: 100px; }
.dg-rs-desc { font-size: 12px; color: var(--dg-t2); line-height: 1.5; margin-bottom: 6px; }

// API Setting for Gemini
const apiKey = ""; 
// Retries logic for robust API
const delay = ms => new Promise(res => setTimeout(res, ms));
async function fetchWithRetry(url, options, retries = 5) {
  const delays = [1000, 2000, 4000, 8000, 16000];
  for (let i = 0; i < retries; i++) {
    try {
      const response = await fetch(url, options);
      if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
      return await response.json();
    } catch (error) {
      if (i === retries - 1) throw error;
      await delay(delays[i]);
    }
  }
}

// Global Colors

  blue:'#3B8BD4', teal:'#5DCAA5', amber:'#EF9F27', purple:'#7F77DD',

};

// 숫자를 통화(달러/원화)에 맞게 기호와 함께 축약해주는 스마트 포맷터
function formatCurrency(n, currency = '₩', showSign = true) {
  const abs = Math.abs(n);
  const sign = (n < 0 && showSign) ? '-' : '';
  let formatted = '';
  
  if (currency === '$') {
    if (abs >= 1e12) formatted = (abs / 1e12).toFixed(1).replace('.0', '') + 'T';
    else if (abs >= 1e9) formatted = (abs / 1e9).toFixed(1).replace('.0', '') + 'B';
    else if (abs >= 1e6) formatted = (abs / 1e6).toFixed(1).replace('.0', '') + 'M';
    else formatted = abs.toLocaleString();
    return `${sign}$${formatted}`;
  } else {
    if (abs >= 1e12) formatted = (abs / 1e12).toFixed(1).replace('.0', '') + '조';
    else if (abs >= 1e8) formatted = (abs / 1e8).toFixed(1).replace('.0', '') + '억';
    else if (abs >= 1e4) formatted = Math.round(abs / 1e4).toLocaleString() + '만';
    else formatted = abs.toLocaleString();
    return `${sign}₩${formatted}`;
  }
}

// 한국어 조사 처리 ('은/는')
function getEunNeun(word) {
  if (!word) return '는';
  const lastChar = word.charCodeAt(word.length - 1);
  if (lastChar >= 0xAC00 && lastChar <= 0xD7A3) {
    return (lastChar - 0xAC00) % 28 > 0 ? '은' : '는';
  }
  const lastStr = word.charAt(word.length - 1);
  if (/[013678]/.test(lastStr)) return '은';
  if (/[2459]/.test(lastStr)) return '는';
  if (/[lmnrLMNR]/.test(lastStr)) return '은';
  return '는';
}

window.handleSim = function(pageId) {
  const page = PAGES[pageId];
  if(!page || !page.meta || !page.meta.simData) return;
  
  const sim = page.meta.simData;
  const curr = page.meta.currency || '₩';
  const vars = {};
  
  sim.vars.forEach(v => {
    const el = document.getElementById(`${pageId}-var-${v.id}`);
    const valEl = document.getElementById(`${pageId}-var-${v.id}-val`);
    if(el && valEl) {
      const val = parseFloat(el.value);
      vars[v.id] = val;
      valEl.textContent = v.unit.includes('$') ? '$' + val.toLocaleString() : val.toLocaleString() + v.unit;
    }
  });

  sim.outs.forEach((o, idx) => {
    const outEl = document.getElementById(`${pageId}-out-${idx}`);
    if(outEl) {
      try {
        const keys = Object.keys(vars);
        const values = Object.values(vars);
        const func = new Function(...keys, `return ${o.formula};`);
        const result = func(...values);
        outEl.textContent = typeof result === 'number' ? formatCurrency(result, curr, true) : result;
      } catch(e) {
        outEl.textContent = '-';
      }
    }
  });
};

  [핵심 주의사항 - 퀄리티, 단위, 인터랙티브 강제 규정]
  1. 제목 일관성(title): 무조건 "${exactTitle}" 라고 정확히 똑같이 작성하세요. (은/는 자동계산됨)
  2. 통화 분리(currency): 미국/글로벌 기업은 반드시 달러($) 기준으로 작성하고, 한국 기업은 원화(₩)를 사용하세요. 미국 기업의 매출을 억지로 원화로 환산하지 말고, 본래의 달러 단위(수십 억 달러 등)를 그대로 'v'값(숫자)에 넣으세요. (meta.currency에 "$" 또는 "₩" 명시)
  3. 볼륨과 깊이: 내용이 짧으면 안 됩니다. metrics, breakdown, comparison, charts, simulator, insights 모든 필드를 꽉 채워 풍성한 리포트를 만드세요.
  4. 데이터 구조 세부: 
     - metrics: 4개의 핵심 재무 지표.
     - breakdown: 수익구조 흐름(총매출(+) -> 비용1(-) -> 비용2(-) -> 순이익(=))을 최소 6~8개 단계로 세밀하게 작성. 'v'는 계산 가능한 실제 숫자(Number)여야 합니다.
     - comparison: 비즈니스 모델 분석을 위한 비교 표 (left, right 각각 행 4~5개).
     - charts: 인터랙티브 차트를 구성할 데이터 '무조건 2개'를 만드세요. (type: "bar" 또는 "doughnut")
  5. 인터랙티브 시뮬레이터(simulator): 사용자가 직접 슬라이더를 움직여 수익을 계산해볼 수 있는 변수(vars)와 결과값(outs)을 반드시 만드세요.
     - outs의 formula는 vars의 id(예: v1, v2)를 활용한 자바스크립트 수식 문자열이어야 합니다. (예: "v1 * v2 * 0.5")

  [JSON 형식]
  {
    "id": "english_short_id",
    "label": "주제명(짧게)",
    "badge": "카테고리명",
    "title": "${exactTitle}",
    "sub": "서브 타이틀(수익 구조의 핵심 요약)",
    "meta": { "margin": 15, "tags": ["태그1", "태그2"], "currency": "$" },
    "metrics": [ 
      {"l":"지표명","v":"값(예: $12B, 9.5조)","s":"설명","c":"g/r/a/null"} 
    ],
    "breakdown": [ 
      {"lbl":"항목명","v":숫자값(Number),"col":"색상코드(비용은 #888780 등 무채색 활용 권장, 붉은색 남발 금지)","s":"+/-/="} 
    ],
    "simulator": {
      "title": "수익 시뮬레이터",
      "desc": "조건을 조절하여 예상 수익을 직접 계산해보세요.",
      "vars": [
        {"id": "v1", "lbl": "변수명1(예: 월 구독료)", "min": 5, "max": 50, "val": 15, "step": 1, "unit": "$"},
        {"id": "v2", "lbl": "변수명2(예: 구독자(만명))", "min": 10, "max": 1000, "val": 300, "step": 10, "unit": "만명"}
      ],
      "outs": [
        {"lbl": "결과명1(예: 연간 매출)", "formula": "v1 * v2 * 10000 * 12", "color": "var(--t1)"},
        {"lbl": "결과명2(예: 예상 순이익)", "formula": "(v1 * v2 * 10000 * 12) * 0.2", "color": "var(--grn)"}
      ]
    },
    "comparison": {
      "left": { "title": "비교군 A", "rows": [{"lbl": "항목", "val": "내용"}] },
      "right": { "title": "비교군 B", "rows": [{"lbl": "항목", "val": "내용"}] }
    },
    "charts": [
      {
        "type": "bar",
        "title": "차트 제목",
        "desc": "차트 설명",
        "labels": ["항목1", "항목2"],
        "data": [10, 20]
      }
    ],
    "insights": [ 
      {"n":"핵심단어/숫자","t":"인사이트 제목","b":"상세 설명"} 
    ]
  }`;

  try {
    const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
    const payload = {
      contents: [{ parts: [{ text: prompt }] }],
      tools: [{ "google_search": {} }],
      generationConfig: { responseMimeType: "application/json" }
    };
    
    const result = await fetchWithRetry(url, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload)
    });

    const text = result.candidates?.[0]?.content?.parts?.[0]?.text;
    if(!text) throw new Error("No text returned");
    
    const data = JSON.parse(text);
    
    PAGES[data.id] = {
      label: data.label,
      meta: { ...data.meta, simData: data.simulator },
      render() {
        const tagHtml = (data.meta?.tags || []).map(t => `<span class="pg-badge tag">#${t}</span>`).join('');
        const curr = data.meta?.currency || '₩';
        const maxV = Math.max(...data.breakdown.map(i => Math.abs(i.v)));
        
        let simHtml = '';
        if (data.simulator && data.simulator.vars && data.simulator.outs) {
          simHtml = `
          <div class="sim-card">
            <div class="card-t">${data.simulator.title}</div>
            <div class="card-d" style="margin-bottom:14px;">${data.simulator.desc}</div>
            ${data.simulator.vars.map(v => `
              <div class="sl-row">
                <label class="sl-lbl">${v.lbl}</label>
                <input type="range" min="${v.min}" max="${v.max}" value="${v.val}" step="${v.step}" id="${data.id}-var-${v.id}" oninput="window.handleSim('${data.id}')">
                <span class="sl-val" id="${data.id}-var-${v.id}-val">${v.unit.includes('$') ? '$'+v.val.toLocaleString() : v.val.toLocaleString()+v.unit}</span>
              </div>
            `).join('')}
            <div class="sim-outs">
              ${data.simulator.outs.map((o, idx) => `
                <div class="so">
                  <div class="so-l">${o.lbl}</div>
                  <div class="so-v" id="${data.id}-out-${idx}" style="color:${o.color||'inherit'};"></div>
                </div>
              `).join('')}
            </div>
          </div>`;
        }

        let chartsHtml = '';
        if (data.charts && data.charts.length > 0) {
          chartsHtml = `<div class="cg ${data.charts.length === 1 ? 'full' : ''}">`;
          data.charts.forEach((ch, idx) => {
            chartsHtml += `
            <div class="card">
              <div class="card-t">${ch.title}</div>
              <div class="card-d">${ch.desc}</div>
              <div class="ch-wrap" style="height:220px;"><canvas id="${data.id}-ch-${idx}"></canvas></div>
            </div>`;
          });
          chartsHtml += '</div>';
        }

        let compHtml = '';
        if (data.comparison && data.comparison.left && data.comparison.right) {
          compHtml = `
          <div class="cmp-grid" style="margin-bottom:24px;">
            <div class="cmp-col"><div class="cmp-head">${data.comparison.left.title}</div>
              ${data.comparison.left.rows.map(r => `<div class="cmp-row"><span>${r.lbl}</span><span>${r.val}</span></div>`).join('')}
            </div>
            <div class="cmp-col hl"><div class="cmp-badge">비교 우위/변화</div><div class="cmp-head">${data.comparison.right.title}</div>
              ${data.comparison.right.rows.map(r => `<div class="cmp-row"><span>${r.lbl}</span><span>${r.val}</span></div>`).join('')}
            </div>
          </div>`;
        }
        
        return `
        <div class="pg-head">
          <div class="pg-badges">
            <span class="pg-badge">AI 분석: ${data.badge || '비즈니스'}</span>
            ${tagHtml}
          </div>
          <div class="pg-title">${formatMoneyTitle(data.title)}</div>
          <div class="pg-sub">${data.sub}</div>
        </div>
        ${metHtml(data.metrics)}
        
        <div class="cg full">
          <div class="card">
            <div class="card-t">수익 및 비용 구조 분해 (추정치)</div>
            <div class="card-d">실제 수치 기반으로 분석한 수익의 흐름입니다. (단위: ${curr})</div>
            <div style="margin-top:20px;">
              ${bdHtml(data.breakdown, maxV, curr)}
            </div>
          </div>
        </div>

        ${simHtml}
        ${compHtml}
        ${chartsHtml}
        ${insHtml(data.insights)}
        `;
      },
      charts() {
        if (data.charts && data.charts.length > 0) {
          data.charts.forEach((ch, idx) => {
            const isDoughnut = ch.type === 'doughnut';
            const bgColors = isDoughnut ? [C.blue, C.teal, C.amber, C.purple, C.coral, C.gray, C.bBlue, C.bTeal] : C.bBlue;
            mc(`${data.id}-ch-${idx}`, {
              type: ch.type,
              data: {
                labels: ch.labels,
                datasets: [{
                  data: ch.data,
                  backgroundColor: bgColors,
                  borderWidth: isDoughnut ? 0 : 1,
                  borderRadius: isDoughnut ? 0 : 4
                }]
              },
              options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                  legend: { display: isDoughnut, position: 'right', labels:{color:tc, font:{size:11}, boxWidth:10} }
                },
                scales: isDoughnut ? {} : {
                  x: { ticks: { color: tc }, grid: { display: false } },
                  y: { ticks: { color: tc }, grid: { color: gc } }
                }
              }
            });
          });
        }
        if (data.simulator) {
          window.handleSim(data.id);
        }
      }
    };

    const aiCat = NAV.find(c => c.cat === 'AI 생성 리포트');
    if(!aiCat.items.find(i => i.id === data.id)) {
      aiCat.items.push({ id: data.id, label: data.label });
    }
    
    navigate(data.id);

  } catch(e) {
    console.error("AI Generation failed:", e);
    document.getElementById('content').innerHTML = `
      <div class="welcome" style="min-height:50vh;">
        <div class="wt">앗, 분석에 실패했습니다.</div>
        <div class="ws">잠시 후 다시 시도해주세요.<br><span style="font-size:12px;color:var(--red);">${e.message}</span></div>
        <button class="btn-s" onclick="navigateHome()">홈으로 돌아가기</button>
      </div>
    `;
  }
}

// ─── PAGE HELPERS ─────────────────────────────────────────────────────────────
function formatMoneyTitle(title){ return title.includes('돈을 버나') ? title.replace('돈을 버나', '<em>돈을 버나</em>') : title; }
function metHtml(mets){ return `<div class="mets">${mets.map(m=>`<div class="met"><div class="met-lbl">${m.l}</div><div class="met-val ${m.c||''}">${m.v}</div><div class="met-sub">${m.s||''}</div></div>`).join('')}</div>`; }
function insHtml(ins){ return `<div class="ins-grid">${ins.map(i=>`<div class="ins-card"><div class="ins-num">${i.n}</div><div class="ins-title">${i.t}</div><div class="ins-body">${i.b}</div></div>`).join('')}</div>`; }
function relHtml(ids){ return `<div class="rel-sec"><div class="rel-title">연관 항목</div><div class="rel-chips">${ids.map(id=>`<div class="chip" onclick="navigate('${id}')">${PAGES[id]?.label||id}</div>`).join('')}</div></div>`; }
function bdHtml(items, maxV, currency = '₩'){
  return items.map(i=>{
    const pct = Math.min(100, Math.round(Math.abs(i.v)/maxV*100));
    let col = i.col || (i.v < 0 ? C.gray : C.blue); 
    const textCol = i.v<0?'var(--t2)':i.lbl?.includes('순이익')||i.lbl?.includes('실수령')||i.lbl?.includes('창출')?'var(--grn)':'var(--t1)';
    const valText = typeof i.v === 'number' ? formatCurrency(i.v, currency, false) : Math.abs(i.v);
    
    return `<div class="bd-item"><span class="bd-lbl">${i.lbl}</span><div class="bd-bar-wrap"><div class="bd-bar" style="width:${pct}%;background:${col};"></div></div><span class="bd-val" style="color:${textCol};">${i.s||''} ${valText}</span></div>`;
  }).join('');
}

// 당근마켓 시뮬레이터 함수
window.dgCalc = function() {
  const elMau = document.getElementById('dg-sl-mau');
  const elArpu = document.getElementById('dg-sl-arpu');
  const elFee = document.getElementById('dg-sl-fee');
  const elPay = document.getElementById('dg-sl-pay');
  if(!elMau || !elArpu || !elFee || !elPay) return;

  const mau = parseInt(elMau.value);
  const arpu = parseInt(elArpu.value);
  const fee = parseFloat(elFee.value);
  const pay = parseInt(elPay.value);

  document.getElementById('dg-v-mau').textContent = mau.toLocaleString() + '만';
  document.getElementById('dg-v-arpu').textContent = arpu.toLocaleString() + '원';
  document.getElementById('dg-v-fee').textContent = fee + '%';
  document.getElementById('dg-v-pay').textContent = pay.toLocaleString() + '억';

  const adRev = Math.round((mau * arpu) / 100) / 100; // 억 단위
  const feeRev = Math.round(pay * fee / 100 * 100) / 100;
  const payRev = Math.round(pay * 0.003 * 100) / 100;
  const total = Math.round((adRev + feeRev + payRev) * 10) / 10;

  document.getElementById('dg-s-adrev').textContent = (Math.round(adRev * 10) / 10).toLocaleString() + '억';
  document.getElementById('dg-s-fee').textContent = (Math.round(feeRev * 10) / 10).toLocaleString() + '억';
  document.getElementById('dg-s-pay').textContent = payRev.toFixed(1) + '억';
  document.getElementById('dg-s-total').textContent = (Math.round(total * 10) / 10).toLocaleString() + '억';
};

        datasets:[{data:[75,15,7,3],backgroundColor:['#4F46E5','#059669','#0284C7','#C0C7E8'],borderWidth:0}]
      },
      options:{
        responsive:true,maintainAspectRatio:false,cutout:'60%',
        plugins:{legend:{position:'bottom',labels:{color:tc,font:{size:10},boxWidth:10,padding:8}}}
      }
    });
    window.ggCalc = function(){
      const tx = parseInt(document.getElementById('gg-tx').value, 10);
      const amt = parseInt(document.getElementById('gg-amt').value, 10);
      const fee = parseInt(document.getElementById('gg-fee-rate').value, 10);
      const aff = parseInt(document.getElementById('gg-aff').value, 10);
      document.getElementById('gg-tx-v').textContent = tx >= 10000 ? ((tx % 10000 === 0 ? (tx / 10000).toFixed(0) : (tx / 10000).toFixed(1)) + '만건') : (tx.toLocaleString() + '건');
      document.getElementById('gg-amt-v').textContent = '$' + amt;
      document.getElementById('gg-fee-rate-v').textContent = fee + '%';
      document.getElementById('gg-aff-v').textContent = aff + '%';
      const gmv = tx * amt;
      const feeRev = Math.round(gmv * fee / 100);
      const affRev = Math.round(gmv * aff / 100 * 0.03);
      const total = feeRev + affRev;
      const fmt = (n) => {
        if (n >= 1000000) return '$' + (n / 1000000).toFixed(1).replace('.0', '') + 'M';
        if (n >= 1000) return '$' + (n / 1000).toFixed(0) + 'K';
        return '$' + n.toLocaleString();
      };
      document.getElementById('gg-out-gmv').textContent = fmt(gmv);
      document.getElementById('gg-out-fee').textContent = fmt(feeRev);
      document.getElementById('gg-out-aff').textContent = fmt(affRev);
      document.getElementById('gg-out-total').textContent = fmt(total);
    };
    window.ggCalc();
  }
},

// ─── CALCULATORS ─────────────────────────────────────────────────────────────
function trCalc() {
  const tx = parseInt(document.getElementById('tr-tx')?.value||800);
  const burn = parseFloat(document.getElementById('tr-burn')?.value||5);
  const price = parseFloat(document.getElementById('tr-price')?.value||0.12);

  if(document.getElementById('tr-tx-v')) document.getElementById('tr-tx-v').textContent = tx + '만건';
  if(document.getElementById('tr-burn-v')) document.getElementById('tr-burn-v').textContent = burn + ' TRX';
  if(document.getElementById('tr-price-v')) document.getElementById('tr-price-v').textContent = '$' + price;

  const dailyBurnTRX = tx * 10000 * burn;
  const dailyBurnUSD = dailyBurnTRX * price;
  const annualBurnUSD = dailyBurnUSD * 365;

  if(document.getElementById('tr-out-0')) document.getElementById('tr-out-0').textContent = formatCurrency(dailyBurnTRX, '', false) + ' TRX';
  if(document.getElementById('tr-out-1')) document.getElementById('tr-out-1').textContent = formatCurrency(dailyBurnUSD, '$', false);
  if(document.getElementById('tr-out-2')) document.getElementById('tr-out-2').textContent = formatCurrency(annualBurnUSD, '$', false);
}

function nfCalc(){
  const subs=parseInt(document.getElementById('nf-subs')?.value||300);
  const arpu=parseFloat(document.getElementById('nf-arpu')?.value||13);
  document.getElementById('nf-subs-v').textContent=subs+'00만명';
  document.getElementById('nf-arpu-v').textContent='$'+arpu;
  const rev=subs*1e6*arpu*12/1e9;
  const cont=17,fixed=7.1;
  const op=rev-cont-fixed;
  const mar=Math.round(op/rev*100);
  document.getElementById('nf-rev').textContent='$'+Math.round(rev)+'억';
  document.getElementById('nf-cpc').textContent='$'+(cont*1e9/(subs*1e6)/12).toFixed(2);
  document.getElementById('nf-op').textContent='$'+Math.round(op)+'억';
  document.getElementById('nf-mar').textContent=mar+'%';
  document.getElementById('nf-mar').style.color=mar>=20?'var(--grn)':'var(--red)';
}

function ytCalc(){
  const v=parseInt(document.getElementById('yt-views')?.value||10);
  const cpm=parseInt(document.getElementById('yt-cpm')?.value||3);
  document.getElementById('yt-views-v').textContent=v+'00만';
  document.getElementById('yt-cpm-v').textContent='$'+cpm;
  const gross=v*10000*cpm/1000;
  const net=Math.round(gross*.55);
  const google=Math.round(gross*.45);
  document.getElementById('yt-gross').textContent='$'+gross.toLocaleString();
  document.getElementById('yt-net').textContent='$'+net.toLocaleString();
  document.getElementById('yt-google').textContent='$'+google.toLocaleString();
  document.getElementById('yt-krw').textContent='₩'+Math.round(net*1370/10000)+'만';
}

function ckCalc(){
  const qty=parseInt(document.getElementById('ck-qty')?.value||50);
  const app=parseInt(document.getElementById('ck-app')?.value||70)/100;
  const rent=parseInt(document.getElementById('ck-rent')?.value||120)*10000;
  const staff=parseInt(document.getElementById('ck-staff')?.value||1);
  if(document.getElementById('ck-qty-v')) document.getElementById('ck-qty-v').textContent=qty+'마리';
  if(document.getElementById('ck-app-v')) document.getElementById('ck-app-v').textContent=Math.round(app*100)+'%';
  if(document.getElementById('ck-rent-v')) document.getElementById('ck-rent-v').textContent=Math.round(rent/10000)+'만원';
  if(document.getElementById('ck-staff-v')) document.getElementById('ck-staff-v').textContent=staff+'명';
  const DAYS=25,PRICE=21000;
  const mo=qty*DAYS;
  const app_o=Math.round(mo*app);
  const dir_o=mo-app_o;
  const rev=mo*PRICE;
  const vc=mo*(6300+1200+1050)+app_o*(1848+3500)+dir_o*3000;
  const fc=rent+staff*2600000+300000+200000;
  const profit=rev-vc-fc;
  const mar=Math.round(profit/rev*100);
  if(document.getElementById('ck-rev')) document.getElementById('ck-rev').textContent=fmt(rev);
  if(document.getElementById('ck-cost')) document.getElementById('ck-cost').textContent=fmt(vc+fc);
  if(document.getElementById('ck-profit')){
    document.getElementById('ck-profit').textContent=fmt(profit);
    document.getElementById('ck-profit').style.color=profit>=0?'var(--grn)':'var(--red)';
  }
  if(document.getElementById('ck-margin')){
    document.getElementById('ck-margin').textContent=mar+'%';
    document.getElementById('ck-margin').style.color=mar>=10?'var(--grn)':mar>=0?'var(--amb)':'var(--red)';
  }
}

function caCalc(){
  const cups=parseInt(document.getElementById('ca-cups')?.value||100);
  const price=parseInt(document.getElementById('ca-price')?.value||4500);
  const rent=parseInt(document.getElementById('ca-rent')?.value||150)*10000;
  const staff=parseInt(document.getElementById('ca-staff')?.value||1);
  if(document.getElementById('ca-cups-v')) document.getElementById('ca-cups-v').textContent=cups+'잔';
  if(document.getElementById('ca-price-v')) document.getElementById('ca-price-v').textContent=price.toLocaleString()+'원';
  if(document.getElementById('ca-rent-v')) document.getElementById('ca-rent-v').textContent=Math.round(rent/10000)+'만원';
  if(document.getElementById('ca-staff-v')) document.getElementById('ca-staff-v').textContent=staff+'명';
  const DAYS=26;
  const mo=cups*DAYS;
  const rev=mo*price;
  const food=Math.round(rev*.25);
  const lc=staff*2600000+Math.round(rev*.18);
  const util=350000+Math.round(rev*.015);
  const fee=Math.round(rev*.02);
  const profit=rev-food-rent-lc-util-fee;
  const uc=Math.round(price*.75);
  const fixed=rent+staff*2600000+350000;
  const bep=Math.ceil(fixed/uc/(1-0.035)/DAYS);
  if(document.getElementById('ca-rev')) document.getElementById('ca-rev').textContent=fmt(rev);
  if(document.getElementById('ca-cost')) document.getElementById('ca-cost').textContent=fmt(food+rent+lc+util+fee);
  if(document.getElementById('ca-profit')){
    document.getElementById('ca-profit').textContent=fmt(profit);
    document.getElementById('ca-profit').style.color=profit>=0?'var(--grn)':'var(--red)';
  }
  if(document.getElementById('ca-bep')) document.getElementById('ca-bep').textContent=bep+'잔/일';
}

function rdCalc(){
  const fee=parseInt(document.getElementById('rd-fee')?.value||4000);
  const rate=parseFloat(document.getElementById('rd-rate')?.value||3.5);
  const lease=parseInt(document.getElementById('rd-lease')?.value||450)*1000;
  const fuel=parseInt(document.getElementById('rd-fuel')?.value||12000);
  if(document.getElementById('rd-fee-v')) document.getElementById('rd-fee-v').textContent=fee.toLocaleString()+'원';
  if(document.getElementById('rd-rate-v')) document.getElementById('rd-rate-v').textContent=rate+'건';
  if(document.getElementById('rd-lease-v')) document.getElementById('rd-lease-v').textContent=(lease/1000).toLocaleString()+',000원';
  if(document.getElementById('rd-fuel-v')) document.getElementById('rd-fuel-v').textContent=fuel.toLocaleString()+'원';
  const d=Math.round(rate*10);
  const gross=d*fee;
  const fixedDay=Math.round((lease+200000+160000+100000)/25);
  const wear=Math.round(gross*.02);
  const tcost=fixedDay+fuel+wear;
  const net=gross-tcost;
  if(document.getElementById('rd-gross')) document.getElementById('rd-gross').textContent='₩'+gross.toLocaleString();
  if(document.getElementById('rd-tcost')) document.getElementById('rd-tcost').textContent='₩'+tcost.toLocaleString();
  if(document.getElementById('rd-net')){
    document.getElementById('rd-net').textContent='₩'+net.toLocaleString();
    document.getElementById('rd-net').style.color=net>=0?'var(--grn)':'var(--red)';
  }
  if(document.getElementById('rd-month')) document.getElementById('rd-month').textContent='₩'+(net*25).toLocaleString();
}
